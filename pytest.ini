[pytest]
# Pytest configuration for HireSense test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = testing

# Output options
addopts =
    # Verbose output showing test names
    -v

    # Show extra test summary info
    -ra

    # Show local variables in tracebacks
    -l

    # Coverage options
    --cov=app
    --cov-report=html:testing/coverage_html
    --cov-report=term-missing
    --cov-report=xml:testing/coverage.xml

    # Fail if coverage is below 85%
    --cov-fail-under=85

    # Show coverage for missing lines
    --cov-branch

    # Strict markers - fail on unknown markers
    --strict-markers

    # Show warnings
    -W default

    # Disable pytest-cov warnings
    -p no:warnings

# Markers for test categorization
markers =
    unit: Unit tests - test individual components in isolation
    integration: Integration tests - test component interactions
    system: System tests - end-to-end workflow tests
    slow: Tests that take longer to execute
    auth: Authentication related tests
    admin: Admin functionality tests
    models: Database model tests
    smoke: Quick smoke tests for CI/CD

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */testing/*
    */__pycache__/*
    */site-packages/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    # Standard pragma
    pragma: no cover

    # Don't complain about missing debug code
    def __repr__

    # Don't complain if tests don't cover defensive assertion code
    raise AssertionError
    raise NotImplementedError

    # Don't complain if non-runnable code isn't run
    if __name__ == .__main__.:

    # Don't complain about abstract methods
    @abstractmethod

[coverage:html]
directory = testing/coverage_html

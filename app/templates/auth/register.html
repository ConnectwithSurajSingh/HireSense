{% extends "auth/auth_base.html" %}

{% block title %} – Register{% endblock %}

{% block auth_content %}
<h1 class="text-4xl text-black font-bold tracking-tighter mb-8 text-left">Register</h1>

<form method="POST" class="w-full max-w-md">
  <div class="mb-6">
    <label class="text-xl font-bold block mb-2">Username</label>
    <input name="username" type="text" placeholder="Username" required
      class="text-xl w-full px-4 py-3 rounded-md border border-gray-300 focus:border-green-800 outline-none transition-colors">
  </div>

  <div class="mb-4">
    <label class="text-xl font-bold block mb-2">Email Address</label>
    <input name="email" type="email" placeholder="name@company.com" required
      class="text-xl w-full px-4 py-3 rounded-md border border-gray-300 focus:border-green-800 outline-none transition-colors">
  </div>

  <div class="mb-6">
    <label class="text-xl font-bold block mb-2">Password</label>
    <input name="password" type="password" placeholder="Password" required
      class="text-xl w-full px-4 py-3 rounded-md border border-gray-300 focus:border-green-800 outline-none transition-colors">
  </div>

  <div class="mb-8">
    <div class="flex items-center gap-4">
      <span class="text-xl font-bold">Role</span>
      <div class="flex gap-2">
        <input type="radio" name="role" id="role_manager" value="manager" class="sr-only peer/manager" checked>
        <label for="role_manager"
          class="px-5 py-2 rounded-full border-2 border-green-950 text-green-950 font-semibold cursor-pointer select-none transition-all duration-200 peer-checked/manager:bg-green-950 peer-checked/manager:text-white hover:bg-green-100 peer-checked/manager:hover:bg-green-900">
          Manager
        </label>
        <input type="radio" name="role" id="role_employee" value="employee" class="sr-only peer/employee">
        <label for="role_employee"
          class="px-5 py-2 rounded-full border-2 border-green-950 text-green-950 font-semibold cursor-pointer select-none transition-all duration-200 peer-checked/employee:bg-green-950 peer-checked/employee:text-white hover:bg-green-100 peer-checked/employee:hover:bg-green-900">
          Employee
        </label>
      </div>
    </div>
  </div>

  <button type="submit"
    class="text-xl w-full py-3 mb-6 rounded-md bg-green-950 text-white font-bold hover:bg-green-700 transition-colors shadow-sm">
    Register
  </button>

  <p class="text-center">
    <span class="text-sm text-gray-600">Already have an account? </span>
    <a href="{{ url_for('auth.login') }}" class="text-sm text-green-800 font-semibold hover:underline">Log In</a>
  </p>
</form>
{% endblock %}

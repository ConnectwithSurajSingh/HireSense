name: CI - Automated Testing & Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests with Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.13']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hiresense_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: hiresense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment variables
        run: |
          echo "DATABASE_URL=postgresql://hiresense_test:test_password@localhost:5432/hiresense_test" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key-for-ci" >> $GITHUB_ENV
          echo "ADMIN_PASSWORD=TestAdmin@123" >> $GITHUB_ENV
          echo "FLASK_DEBUG=false" >> $GITHUB_ENV

      - name: Run linting (optional - can be added)
        run: |
          # Uncomment if you want to add linting
          # pip install flake8
          # flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=85 -v

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80

      - name: Upload coverage reports to Codecov (optional)
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          file: ./testing/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

      - name: Upload coverage HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: testing/coverage_html/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            testing/coverage.xml
            pytest.log
          retention-days: 30

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request' && matrix.python-version == '3.13'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 85
          MINIMUM_ORANGE: 70
        continue-on-error: true

  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            testing/coverage.xml
        continue-on-error: true

  coverage-gate:
    name: Coverage Gate (85% Required)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check coverage threshold met
        run: |
          echo "✅ All tests passed with ≥85% coverage!"
          echo "Coverage gate enforced successfully."

name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'app/**'
      - 'docs/**'
      - 'testing/**'
      - 'utility/**'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'app/**'
      - 'docs/**'
      - 'testing/**'
      - 'utility/**'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install sphinx myst-parser sphinx-autodoc-typehints
          pip install sphinx-rtd-theme || true
          pip install shibuya || true
          pip install flask flask-sqlalchemy flask-login flask-migrate werkzeug

      - name: Download spaCy model (optional)
        run: |
          pip install spacy || true
          python -m spacy download en_core_web_sm || true
        continue-on-error: true

      - name: Build Sphinx documentation
        run: |
          cd docs
          sphinx-build -b html -W --keep-going . _build/html 2>&1 | tee build.log || true
          # Check if index.html was created
          if [ -f "_build/html/index.html" ]; then
            echo "Documentation built successfully"
          else
            echo "Warning: index.html not found, attempting permissive build"
            sphinx-build -b html . _build/html
          fi

      - name: Verify build output
        run: |
          echo "Build artifacts:"
          ls -la docs/_build/html/ || echo "Build directory not found"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx myst-parser sphinx-autodoc-typehints
          pip install sphinx-rtd-theme || true
          pip install shibuya || true
          pip install flask flask-sqlalchemy flask-login flask-migrate werkzeug

      - name: Download spaCy model
        run: |
          pip install spacy || true
          python -m spacy download en_core_web_sm || true
        continue-on-error: true

      - name: Build documentation
        run: |
          cd docs
          sphinx-build -b html . _build/html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifacts to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

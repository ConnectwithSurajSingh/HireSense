name: Build and Deploy Sphinx Documentation

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'app/**'
      - 'docs/**'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'app/**'
      - 'docs/**'
      - 'requirements.txt'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints
          pip install -r requirements.txt || pip install flask flask-sqlalchemy flask-login flask-migrate

      - name: Download spaCy model (for documentation build)
        run: |
          python -m spacy download en_core_web_sm || true

      - name: Build Sphinx documentation
        run: |
          cd docs
          sphinx-build -b html -W --keep-going . _build/html
        continue-on-error: true

      - name: Check if documentation was built
        run: |
          if [ -d "docs/_build/html" ]; then
            echo "Documentation built successfully"
            ls -la docs/_build/html/
          else
            echo "Documentation build failed"
            exit 1
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints
          pip install -r requirements.txt || pip install flask flask-sqlalchemy flask-login flask-migrate

      - name: Download spaCy model
        run: |
          python -m spacy download en_core_web_sm || true

      - name: Build documentation
        run: |
          cd docs
          sphinx-build -b html . _build/html

      - name: Upload artifacts to GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
